name: OpenVINO GenAI - Version Matrix

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Runner OS"
        type: choice
        options:
          - windows-latest
          - ubuntu-24.04
        default: windows-latest
  push:
    branches:
      - main
      - v*-release

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_TORCH_BACKEND: cpu
  UV_SYSTEM_PYTHON: true
  TRANSFORMERS_IS_CI: true
  PYTHONUNBUFFERED: "1"
  HF_TOKEN: ${{ secrets.HF_HUB_READ_TOKEN }}

jobs:
  check-relevance:
    runs-on: ubuntu-24.04
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # only run on push to main if either this workflow file or extract_architectures script changed
      - name: Check if relevant files changed
        id: check
        run: |
          if [[ "${{ github.ref }}" != "refs/heads/main" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 | grep -qE '(\.github/workflows/test_openvino_genai_version_matrix\.yml|tests/openvino/extract_architectures_by_version\.py)'; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-run=false" >> "$GITHUB_OUTPUT"
          fi

  build-matrix:
    needs: check-relevance
    if: needs.check-relevance.outputs.should-run == 'true'
    runs-on: ubuntu-24.04
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install .[tests]

      - name: Get transformers versions
        id: get-versions
        run: |
          versions=$(python tests/openvino/extract_architectures_by_version.py --json-versions)
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  test:
    needs: build-matrix
    strategy:
      fail-fast: false
      matrix:
        transformers-version: ${{ fromJson(needs.build-matrix.outputs.versions) }}
        openvino-version: ["2026.0.*", "latest"]

    runs-on: ${{ inputs.os || 'windows-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install .[tests] "transformers==${{ matrix.transformers-version }}"

      - name: Install OpenVINO
        if: matrix.openvino-version != 'latest'
        run: |
          uv pip install --reinstall "openvino==${{ matrix.openvino-version }}" "openvino-tokenizers==${{ matrix.openvino-version }}" "openvino-genai==${{ matrix.openvino-version }}"

      - name: Login with fork PRs CI token
        if: ${{ env.HF_TOKEN == '' }}
        run: |
          python tests/scripts/login_with_ci_token.py

      - name: Verify imports
        run: |
          python -c "import openvino_genai; print('openvino_genai', openvino_genai.__version__)"
          python -c "import openvino; print('openvino', openvino.__version__)"
          python -c "import transformers; print('transformers', transformers.__version__)"
          python -c "import torch; print('torch', torch.__version__)"

      - name: Debug imports step by step
        shell: python
        run: |
          import sys
          print('1. torch...', flush=True)
          import torch
          print('   OK', flush=True)

          print('2. openvino...', flush=True)
          import openvino as ov
          print('   OK', flush=True)

          print('3. openvino_genai...', flush=True)
          from openvino_genai import LLMPipeline, VLMPipeline, WhisperPipeline, Text2SpeechPipeline, draft_model
          print('   OK', flush=True)

          print('4. transformers...', flush=True)
          from transformers import AutoModelForCausalLM, AutoTokenizer, AutoProcessor, AutoConfig, AutoModelForSpeechSeq2Seq, AutoModelForTextToSpectrogram, set_seed
          print('   OK', flush=True)

          print('5. optimum.exporters.openvino...', flush=True)
          from optimum.exporters.openvino import main_export
          print('   OK', flush=True)

          print('6a. modeling_base...', flush=True)
          from optimum.intel.openvino.modeling_base import OVBaseModel
          print('   OK', flush=True)

          print('6b. modeling...', flush=True)
          from optimum.intel.openvino.modeling import OVModel
          print('   OK', flush=True)

          print('6c. modeling_decoder...', flush=True)
          from optimum.intel.openvino.modeling_decoder import OVModelForCausalLM
          print('   OK', flush=True)

          print('6d. modeling_open_clip...', flush=True)
          from optimum.intel.openvino.modeling_open_clip import OVModelOpenCLIPForZeroShotImageClassification
          print('   OK', flush=True)

          print('6e. modeling_sam...', flush=True)
          from optimum.intel.openvino.modeling_sam import OVSamModel
          print('   OK', flush=True)

          print('6f. modeling_seq2seq...', flush=True)
          from optimum.intel.openvino.modeling_seq2seq import OVModelForSeq2SeqLM
          print('   OK', flush=True)

          print('6g. modeling_visual_language...', flush=True)
          from optimum.intel.openvino.modeling_visual_language import OVModelForVisualCausalLM
          print('   OK', flush=True)

          print('All imports successful!', flush=True)

      - name: Verify test collection
        run: |
          python -m pytest tests/openvino/test_genai.py --collect-only -q

      - name: Test with Pytest
        run: |
          python -m pytest tests/openvino/test_genai.py --durations=0
