name: OpenVINO GenAI - Nightly (Self-Hosted)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_TORCH_BACKEND: cpu
  TRANSFORMERS_IS_CI: true
  PYTHONUNBUFFERED: "1"
  HF_TOKEN: ${{ secrets.HF_HUB_READ_TOKEN }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        transformers-version: ["4.57.6", "5.5.*"]
        device: ["GPU", "NPU", "CPU"]
        runner: ["MTL", "LNL"]
    runs-on: [self-hosted, "${{ matrix.runner }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Create virtual environment
        shell: cmd
        run: |
          python -m venv %RUNNER_TEMP%\venv
          %RUNNER_TEMP%\venv\Scripts\python -m pip install --upgrade pip uv

      - name: Install dependencies
        shell: cmd
        run: |
          %RUNNER_TEMP%\venv\Scripts\python -m uv pip install .[tests] "transformers==${{ matrix.transformers-version }}"

      - name: Install OpenVINO GenAI nightly
        shell: cmd
        run: |
          %RUNNER_TEMP%\venv\Scripts\python -m uv pip install --pre --upgrade "openvino-genai>=2026.3.0.0.rc1,<2026.4.0.0" --extra-index-url https://storage.openvinotoolkit.org/simple/wheels/nightly

      - name: Pip freeze
        shell: cmd
        run: |
          %RUNNER_TEMP%\venv\Scripts\python -m uv pip freeze

      - name: Verify imports
        shell: cmd
        run: |
          %RUNNER_TEMP%\venv\Scripts\python -c "import openvino_genai; print('openvino_genai', openvino_genai.__version__)"
          %RUNNER_TEMP%\venv\Scripts\python -c "import openvino; print('openvino', openvino.__version__)"
          %RUNNER_TEMP%\venv\Scripts\python -c "import transformers; print('transformers', transformers.__version__)"
          %RUNNER_TEMP%\venv\Scripts\python -c "import torch; print('torch', torch.__version__)"

      - name: Test with Pytest
        shell: cmd
        env:
          OPENVINO_TEST_DEVICE: ${{ matrix.device }}
        run: |
          %RUNNER_TEMP%\venv\Scripts\python -m pytest tests/openvino/test_genai.py -rpFs --durations=0 --log-cli-level info
